<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - LearnDev</title>
  <link rel="stylesheet" href="index.css">
</head>
<body class="signup-page">

  <div class="form-container">
    <h2>Create Your Account</h2>
    <form id="signupForm">
      <div class="form-group">
        <label for="username">Full Name</label>
        <input type="text" id="username" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary full-width">Submit</button>
    </form>
    <p class="back-link"><a href="index.html"> Back to Home</a></p>
  </div>

  <script src="index.js"></script>
</body>
</html>
